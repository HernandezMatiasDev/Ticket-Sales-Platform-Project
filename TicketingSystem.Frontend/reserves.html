<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"></head>
<body class="custom-bg">

    <nav class="navbar   mb-4">
        <div class="container">
            <span class="navbar-brand">Ticket Sales Platform</span>

            <div class="d-flex d-none align-items-center" id="user-menu">
                <span class="text-light me-3" id="user-email"></span>
                <button class="btn btn-outline-danger btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

        <!-- Panel del Carrito de Reservas -->
    <div id="cart-panel" class="cart-panel d-none">
        <h4 class="text-center mb-3">Tus Reservas</h4>
        <div id="cart-items" class="mb-3">
            <!-- Lista de reservas -->
        </div>
        <h5 id="cart-total" class="text-success text-end mb-3">Total: $0</h5>
        
        <!-- Contenedor del temporizador flotante movido al carrito -->
        <div id="timer-container" class="alert alert-warning text-center fw-bold d-none p-2 mb-3">
            Tiempo restante: <span id="timer-text">05:00</span>
        </div>

        <button class="btn btn-success w-100" onclick="procesarPago()">Confirmar y Pagar</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
