<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css"></head>
<body class="custom-bg">


    <nav class="navbar navbar-fixed-custom">
        
        <a href="index.html" class="floating-back-btn"><i class="bi bi-arrow-left"></i> Volver</a>

        <div class="container">
            <div class="d-flex align-items-center">
                <span class="navbar-brand m-0">Ticket Sales Platform - RESERVAS</span>
            </div>

            <div class="d-flex d-none align-items-center" id="user-menu">
                <span class="text-light me-3" id="user-email"></span>
                <button class="btn btn-outline-danger btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

        <!-- Panel del Carrito de Reservas -->
    <div id="cart-panel" class="cart-panel d-none">
        <div class="d-flex justify-content-center align-items-center mb-4">
            <h3 class="text-center fw-bold m-0 text-white">Checkout de Reservas</h3>
        </div>
        
        <div class="bg-dark rounded-4 shadow-sm p-4 mb-4">
            <div id="cart-items" class="mb-4">
                <!-- Lista de reservas -->
            </div>
            <hr class="border-secondary">
            <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="fs-4 text-light">Total a Pagar</span>
                <h3 id="cart-total" class="text-success fw-bold m-0">Total: $0</h3>
            </div>
        </div>
        
        <!-- Contenedor del temporizador flotante movido al carrito -->
        <div class="row mb-4 gx-3">
            <div class="col-6">
                <div id="timer-container" class="alert alert-warning text-center fw-bold m-0 rounded-pill shadow-sm fs-5 h-100 d-flex align-items-center justify-content-center d-none">
                    <i class="bi bi-clock-history me-2"></i><span id="timer-text">--:--</span>
                </div>
            </div>
            <div class="col-6">
                <button class="btn btn-outline-info rounded-pill w-100 shadow-sm h-100 fs-5 d-flex align-items-center justify-content-center" style="min-height: 58px;" onclick="abrirModalMapaReserva()">Ver Asientos</button>
            </div>
        </div>

        <button class="btn btn-success btn-lg rounded-pill w-100 fw-bold shadow" onclick="procesarPago()">Confirmar y Pagar</button>
    </div>

    <!-- Modal del Mapa de Reservas (Solo Lectura) -->
    <div class="modal fade" id="readonlySeatMapModal" tabindex="-1" aria-labelledby="readonlySeatMapModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="readonlySeatMapModalLabel">Mapa de Asientos - Mis Reservas</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="readonlySectorSelect" class="form-label">Seleccione un Sector:</label>
                        <select id="readonlySectorSelect" class="form-select" onchange="cargarMapaReserva()">
                        </select>
                    </div>
                    <div id="contenedor-asientos-readonly" class="text-center p-3 bg-light border rounded">
                        <p class="text-muted">Seleccione un sector para visualizar.</p>
                    </div>
                    <div class="mt-3 d-flex justify-content-center gap-3">
                        <span class="badge bg-success"><i class="bi bi-circle-fill text-white"></i> Pendientes</span>
                        <span class="badge" style="background-color: #e83e8c;"><i class="bi bi-circle-fill text-white"></i> Pagadas</span>
                        <span class="badge bg-secondary"><i class="bi bi-circle-fill text-white"></i> Otros</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
