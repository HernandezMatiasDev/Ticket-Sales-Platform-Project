<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css"></head>
<body class="custom-bg">

    <nav class="navbar navbar-fixed-custom">
        <div class="container">
            <span class="navbar-brand">Ticket Sales Platform</span>
            <div class="d-flex" id="auth-buttons">
                <button class="btn btn-outline-light me-2" data-bs-toggle="modal" data-bs-target="#loginModal">Iniciar Sesión</button>
                <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#registerModal">Registrarse</button>
            </div>
            <div class="d-flex d-none align-items-center " id="user-menu">
                <span class="user-menu-stls me-3" id="user-email"></span>
                <button class="btn btn-outline-info btn-sm me-2" onclick="abrirModalMisEntradas()">Mis Entradas</button>
                <button class="btn btn-outline-danger btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container mt-10">
        <div class="main-content-wrapper mx-auto p-4">
            <h2 class="text-center mb-4 card-general-title">Eventos Disponibles</h2>
            <hr>
            <div id="contenedor-eventos" class="row justify-content-center">
                <p class="text-center">Cargando eventos desde la API...</p>
            </div>
        </div>
    </div>

    <!-- Modal de Login -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="loginModalLabel">Iniciar Sesión</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="loginEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <div id="loginMessage" class="d-none mb-3"></div>
                        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Registro -->
    <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="registerModalLabel">Registrarse</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="registerEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="registerEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerPassword" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="registerPassword" required>
                        </div>
                        <div id="registerMessage" class="d-none mb-3"></div>
                        <button type="submit" class="btn btn-primary w-100">Registrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal del Mapa de Asientos -->
    <div class="modal fade" id="seatMapModal" tabindex="-1" aria-labelledby="seatMapModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="seatMapModalLabel">Mapa de Asientos</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="sectorSelect" class="form-label">Seleccione un Sector:</label>
                        <select id="sectorSelect" class="form-select">
                        </select>
                    </div>
                    <div id="contenedor-asientos" class="text-center p-3 bg-light border rounded">
                        <!-- Asientos cargados dinámicamente -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Mis Entradas -->
    <div class="modal fade" id="myTicketsModal" tabindex="-1" aria-labelledby="myTicketsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="myTicketsModalLabel">Mis Entradas / Asientos Pendientes</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="myTicketsEventSelect" class="form-label">Seleccione un Evento:</label>
                        <select id="myTicketsEventSelect" class="form-select" onchange="actualizarSectoresMisEntradas()">
                            <option value="">Cargando eventos...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="myTicketsSectorSelect" class="form-label">Seleccione un Sector:</label>
                        <select id="myTicketsSectorSelect" class="form-select" onchange="cargarMapaMisEntradas()">
                            <option value="">Seleccione un evento primero</option>
                        </select>
                    </div>
                    <div id="contenedor-mis-asientos" class="text-center p-3 bg-light border rounded">
                        <p class="text-muted">Seleccione un evento y sector para ver el mapa de asientos.</p>
                    </div>
                    <div class="mt-3 d-flex justify-content-center gap-3">
                        <span class="badge bg-success"><i class="bi bi-circle-fill text-white"></i> Pendientes</span>
                        <span class="badge" style="background-color: #e83e8c;"><i class="bi bi-circle-fill text-white"></i> Pagadas</span>
                        <span class="badge bg-secondary"><i class="bi bi-circle-fill text-white"></i> Otros</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmación de Reserva -->
    <div class="modal fade" id="confirmReserveModal" tabindex="-1" aria-labelledby="confirmReserveModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-elevated">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmReserveModalLabel">Confirmar Reserva</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <p id="confirmReserveBody" class="fs-5 mb-0"></p>
                </div>
                <div class="modal-footer justify-content-center border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn " onclick="procesarReservaConfirmada()">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

<!-- Botón del temporizador flotante -->
    <a href="reserves.html" style="text-decoration: none;"> 
        <div id="cart-panel" class="d-none timer-btn d-flex align-items-center justify-content-center"> 
            <i class="bi bi-cart fs-4"></i>
            <span class="ms-2 fw-bold" id="timer-text">--:--</span>
        </div>
    </a>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
